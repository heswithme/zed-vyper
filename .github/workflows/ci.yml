name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cargo Check
        run: cargo check

      - name: Install Tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Clone Pinned Grammar
        run: |
          git clone https://github.com/heswithme/vyper-tree-sitter /tmp/vyper-tree-sitter
          git -C /tmp/vyper-tree-sitter checkout 6f78ae655bc405e2be898e30cf70ff37121fc933
          cd /tmp/vyper-tree-sitter
          tree-sitter generate

      - name: Parse Fixtures
        run: |
          tree-sitter parse -q -p /tmp/vyper-tree-sitter fixtures/*.vy fixtures/*.vyi

      - name: Query Highlights
        run: |
          tree-sitter query languages/vyper/highlights.scm -p /tmp/vyper-tree-sitter fixtures/*.vy fixtures/*.vyi > /tmp/vyper-highlights.txt
